<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture 3 — Transformer Things</title>
  <link rel="stylesheet" href="../../themes/eclipse.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 860px;
    }

    .label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--theme-accent);
      margin-bottom: 1.4rem;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 1.8rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease 0.1s, transform 0.55s ease 0.1s;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease 0.25s, transform 0.5s ease 0.25s;
    }

    .topic {
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      border: 1px solid var(--theme-border);
      background: var(--theme-surface);
      font-size: 0.85rem;
      color: var(--theme-color-muted);
    }

    .topic.accent {
      border-color: var(--theme-accent);
      color: var(--theme-accent);
      background: transparent;
    }

    .shown .label,
    .shown h1,
    .shown .topics {
      opacity: 1;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content">
    <div class="label">CSS 366 · Lecture 3</div>
    <h1>Transformer<br>Things</h1>
    <div class="topics">
      <span class="topic accent">Layer Norm</span>
      <span class="topic accent">Activations</span>
      <span class="topic accent">Positional Embeddings</span>
      <span class="topic">Serial vs Parallel</span>
      <span class="topic">Hyperparameters</span>
      <span class="topic">Stability Tricks</span>
      <span class="topic">Attention Heads</span>
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.querySelector('.content').classList.add('shown')
      }
      if (e.data?.type === 'slideExit') {
        document.querySelector('.content').classList.remove('shown')
      }
    })
  </script>
</body>
</html>
