<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bias &amp; Variance</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--theme-accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--theme-color) 40%, var(--theme-accent-alt));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
    }

    .meta {
      display: flex;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      font-size: 0.9rem;
      color: var(--theme-color-muted);
      opacity: 0;
      transition: opacity 0.5s ease 0.4s;
    }

    .meta-divider {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--theme-border);
    }

    .visible .eyebrow { opacity: 1; transform: translateY(0); }
    .visible h1       { opacity: 1; transform: translateY(0); }
    .visible .meta    { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">
    <div class="eyebrow">Machine Learning</div>
    <h1>Bias &amp; Variance</h1>
    <div class="meta">
      <span>H. Dychko, <a href="https://claude.ai" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--theme-border);">claude.ai</a>, <a href="https://chatgpt.com" target="_blank" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--theme-border);">chatgpt.com</a></span>
      <span class="meta-divider"></span>
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
