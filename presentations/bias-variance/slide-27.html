<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fb923c;
      padding: 0.35rem 1rem;
      border: 2px solid #fb923c;
      border-radius: 99px;
      background: rgba(251, 146, 60, 0.12);
      margin-bottom: 0.6rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    h2 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.07s, transform 0.5s ease 0.07s;
    }

    .question-box {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      padding: 0.85rem 1.4rem;
      border: 2px solid #fb923c;
      border-radius: 10px;
      background: rgba(251, 146, 60, 0.07);
      text-align: left;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease 0.22s, transform 0.4s ease 0.22s;
    }

    .q-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #fb923c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
    }

    .q-body {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .q-scenario {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--theme-color-muted);
    }

    .metric-row {
      display: flex;
      gap: 2rem;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .metric-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--theme-color-muted);
    }

    .metric-value {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .metric-value.train { color: #4ade80; }
    .metric-value.test  { color: #f87171; }

    .q-text {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--theme-color);
      line-height: 1.45;
    }

    .visible .eyebrow      { opacity: 1; transform: translateY(0); }
    .visible h2            { opacity: 1; transform: translateY(0); }
    .visible .question-box { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">

    <div class="eyebrow"><span>⚡</span><span>Challenge</span></div>
    <h2>Diagnose this model</h2>

    <div class="question-box">
      <div class="q-circle">?</div>
      <div class="q-body">
        <div class="q-scenario">Scenario:</div>
        <div class="metric-row">
          <div class="metric">
            <div class="metric-label">Train accuracy</div>
            <div class="metric-value train">0.98</div>
          </div>
          <div class="metric">
            <div class="metric-label">Test accuracy</div>
            <div class="metric-value test">0.72</div>
          </div>
        </div>
        <span class="q-text">Is it a problem? What would you do if so?</span>
      </div>
    </div>

  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
