<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSE as a Theorem</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .section-num {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      color: var(--theme-accent);
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--theme-accent);
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease 0.15s, transform 0.4s ease 0.15s;
    }

    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease 0.25s, transform 0.6s ease 0.25s;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--theme-accent);
      border-radius: 2px;
      margin: 0 auto 1.2rem;
      opacity: 0;
      transform: scaleX(0);
      transition: opacity 0.4s ease 0.4s, transform 0.4s ease 0.4s;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--theme-color-secondary);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease 0.5s, transform 0.4s ease 0.5s;
    }

    .visible .section-num   { opacity: 0.12; }
    .visible .section-label { opacity: 1; transform: translateY(0); }
    .visible h1             { opacity: 1; transform: translateY(0); }
    .visible .divider       { opacity: 1; transform: scaleX(1); }
    .visible .subtitle      { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">
    <div class="section-num">§3</div>
    <div class="section-label">Section Three</div>
    <h1>MSE as a Theorem</h1>
    <div class="divider"></div>
    <p class="subtitle">MSE as a consequence of Bias and Variance</p>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
