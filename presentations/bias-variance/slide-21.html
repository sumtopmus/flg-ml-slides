<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approximating 𝔼<sub>D</sub>[·] — four approaches</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--theme-accent);
      margin-bottom: 0.6rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    h2 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.07s, transform 0.5s ease 0.07s;
    }

    .costly-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
      opacity: 0;
      transform: translateY(16px) scale(0.95);
      transition: opacity 0.5s ease 0.22s, transform 0.5s ease 0.22s;
    }

    .costly-badge {
      display: inline-block;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 2rem;
      border-radius: 16px;
      background: rgba(251,191,36,0.15);
      border: 2px solid rgba(251,191,36,0.5);
      color: #fbbf24;
    }

    .visible .eyebrow      { opacity: 1; transform: translateY(0); }
    .visible h2            { opacity: 1; transform: translateY(0); }
    .visible .costly-wrap  { opacity: 1; transform: translateY(0) scale(1); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">

    <div class="eyebrow">§ 4 — Estimation &amp; Practice</div>
    <h2>Approximating 𝔼<sub>D</sub>[·] — four approaches</h2>

    <div class="costly-wrap">
      <div class="costly-badge">COSTLY</div>
    </div>

  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
