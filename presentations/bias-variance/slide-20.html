<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approximating 𝔼<sub>D</sub>[·] — four approaches</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
    }

    .eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--theme-accent);
      margin-bottom: 0.6rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    h2 {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.07s, transform 0.5s ease 0.07s;
    }

    .big-card {
      background: var(--theme-surface);
      border: 1px solid var(--theme-border);
      border-left: 3px solid var(--theme-accent);
      border-radius: 10px;
      padding: 2.5rem;
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.5s ease 0.22s, transform 0.5s ease 0.22s;
    }

    .card-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.25rem 0.8rem;
      border-radius: 999px;
      background: rgba(52,211,153,0.15);
      color: #34d399;
      margin-bottom: 1.2rem;
    }

    .card-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--theme-color);
      margin-bottom: 1rem;
    }

    .card-body {
      font-size: 1rem;
      color: var(--theme-color-secondary);
      line-height: 1.7;
    }

    .card-body strong { color: var(--theme-color); }

    .visible .eyebrow  { opacity: 1; transform: translateY(0); }
    .visible h2        { opacity: 1; transform: translateY(0); }
    .visible .big-card { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">

    <div class="eyebrow">§ 4 — Estimation &amp; Practice</div>
    <h2>Approximating 𝔼<sub>D</sub>[·] — four approaches</h2>

    <div class="big-card">
      <div class="card-title">Rerun with a different random seed</div>
      <div class="card-body">
        If the target metric <strong>doesn't change a lot</strong>,
        no much variance should be in the model.
      </div>
    </div>

  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
