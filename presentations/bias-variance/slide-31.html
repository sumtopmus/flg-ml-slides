<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>
  <link rel="stylesheet" href="../../themes/aurora.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, var(--theme-color) 40%, var(--theme-accent-alt));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease 0.1s, transform 0.6s ease 0.1s;
    }

    .formula-strip {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      opacity: 0;
      transition: opacity 0.5s ease 0.55s;
    }

    .pill {
      padding: 0.4rem 1.2rem;
      border: 1px solid var(--theme-border);
      border-radius: 999px;
      background: var(--theme-surface);
      font-size: 1rem;
      color: var(--theme-color-secondary);
    }

    .visible h1             { opacity: 1; transform: translateY(0); }
    .visible .formula-strip { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-lines"></div>

  <div class="content" id="content">
    <h1>Thank You</h1>
    <div class="formula-strip">
      <span class="pill">MSE = Bias² + Variance + σ²</span>
    </div>
  </div>

  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slideEnter') {
        document.getElementById('content').classList.add('visible')
      }
      if (e.data?.type === 'slideExit') {
        document.getElementById('content').classList.remove('visible')
      }
    })
  </script>
</body>
</html>
